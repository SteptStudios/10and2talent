server {
    listen 3107;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — serve the built app at the domain root, fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
