server {
    listen 3107;
    server_name _;

    root /usr/share/nginx/html;

    # Serve the 10&2 app at /10and2
    location /10and2 {
        alias /usr/share/nginx/html/10and2;
        try_files $uri $uri/ /10and2/index.html;
    }

    # Redirect bare root to /10and2
    location = / {
        return 301 /10and2;
    }

    # Health check
    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
