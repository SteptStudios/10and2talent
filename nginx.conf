server {
    listen 3107;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Vite build — root-relative paths match /usr/share/nginx/html/10and2/...
    location /10and2/ {
        try_files $uri $uri/ /10and2/index.html;
    }

    location = /10and2 {
        return 301 /10and2/;
    }

    location = / {
        return 301 /10and2/;
    }

    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
