<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10&amp;2 Talent</title>
  <meta name="description" content="10&amp;2 Talent — Creative Talent Representation" />
  <meta property="og:title" content="10&amp;2 Talent" />
  <meta property="og:description" content="Creative Talent Representation" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fff;
      color: #000;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      z-index: 100;
      background: #fff;
    }

    nav a {
      text-decoration: none;
      color: #000;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    nav .nav-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero-wordmark {
      font-size: clamp(96px, 16vw, 200px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #000;
    }

    .hero-tagline {
      margin-top: 18px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #999;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: #000;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
      transition: opacity 0.2s;
      background: none;
      border: none;
      padding: 8px;
    }

    .scroll-indicator:hover { opacity: 1; }

    /* ── CONTACT ── */
    .contact {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 48px 80px;
      text-align: center;
    }

    .contact-wordmark {
      font-size: clamp(80px, 14vw, 180px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 80px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      max-width: 960px;
      width: 100%;
    }

    .contact-item {
      padding: 0 40px;
    }

    .contact-item + .contact-item {
      border-left: 1px solid #e8e8e8;
    }

    .contact-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 14px;
    }

    .contact-value {
      font-size: 15px;
      font-weight: 400;
      color: #000;
      line-height: 1.5;
    }

    .contact-value a {
      color: #000;
      text-decoration: none;
    }

    .contact-value a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 48px;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .contact { padding: 80px 24px 60px; }
      .contact-grid { grid-template-columns: 1fr; gap: 48px; }
      .contact-item { padding: 0; border-left: none !important; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#artists">Artist</a>
    <a href="#" class="nav-logo">10&amp;2</a>
    <a href="#contact">Contact</a>
  </nav>

  <section class="hero" id="top">
    <div class="hero-wordmark">10&amp;2</div>
    <div class="hero-tagline">Creative Talent Representation</div>
    <button class="scroll-indicator" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})" aria-label="Scroll down">↓</button>
  </section>

  <section class="contact" id="contact">
    <div class="contact-wordmark">10&amp;2</div>
    <div class="contact-grid">
      <div class="contact-item">
        <div class="contact-label">General Inquiries</div>
        <div class="contact-value"><a href="mailto:info@10and2talent.com">info@10and2talent.com</a></div>
      </div>
      <div class="contact-item">
        <div class="contact-label">Artist Submissions</div>
        <div class="contact-value"><a href="mailto:submissions@10and2talent.com">submissions@10and2talent.com</a></div>
      </div>
      <div class="contact-item">
        <div class="contact-label">Location</div>
        <div class="contact-value">220 W Ivy Ave<br>Inglewood, CA 90302</div>
      </div>
    </div>
  </section>

  <footer>
    &copy; <span id="year"></span> 10&amp;2 Talent &mdash; All rights reserved.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
